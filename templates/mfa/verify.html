{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação MFA — Wisecofre</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #253547 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card { max-width: 420px; width: 100%; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <div class="bg-primary bg-gradient text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:64px;height:64px;">
                    <i class="bi bi-shield-check fs-2"></i>
                </div>
                <h4 class="fw-bold">Verificação em Duas Etapas</h4>
                <p class="text-muted small mb-0">
                    Abra seu aplicativo autenticador e insira o código de 6 dígitos.
                </p>
            </div>

            {% if error %}
            <div class="alert alert-danger py-2 small">{{ error }}</div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="code" class="form-label fw-semibold small">Código TOTP ou código de backup</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="text" name="code" id="code"
                               class="form-control form-control-lg text-center font-monospace"
                               maxlength="10" placeholder="000000" required autofocus autocomplete="one-time-code">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">
                    <i class="bi bi-check-circle me-1"></i> Verificar
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'login' %}" class="text-muted small">Voltar ao login</a>
            </div>
        </div>
    </div>
    <p class="text-center text-white-50 small mt-3">&copy; 2026 Wisecofre</p>
</div>

</body>
</html>
